name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-${{ hashFiles('Cargo.lock') }}
          restore-keys: wasm-

      - name: Build WASM package
        run: wasm-pack build --target web --release

      - name: Assemble site
        run: |
          mkdir -p _site/pkg _site/fonts _site/img
          cp demo.html _site/index.html
          cp pkg/prova_pdf.js pkg/prova_pdf_bg.wasm _site/pkg/
          cp pkg/prova_pdf.d.ts _site/pkg/ 2>/dev/null || true
          cp fonts/*.ttf _site/fonts/
          cp img/logo.jpg _site/img/
          cp -r tests/fixtures _site/tests/fixtures

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
